name: book_exchange_explanation
description: A Flutter project for book exchange app
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase Core
  firebase_core: ^3.12.0

  # Firebase Authentication
  firebase_auth: ^5.5.0

  # Cloud Firestore Database
  cloud_firestore: ^5.6.0

  # Firebase Storage for Images
  firebase_storage: ^12.4.0

  # State Management
  provider: ^6.1.1

  # Image Picker for Book Covers
  image_picker: ^1.0.5

  # Cached Network Images
  cached_network_image: ^3.3.0

  # Date Formatting
  intl: ^0.19.0

  # UI Components
  flutter_rating_bar: ^4.0.1
  shimmer: ^3.0.0

  # Navigation
  go_router: ^13.0.1

  # Utilities
  fluttertoast: ^8.2.4
  image_cropper: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1

flutter:
  uses-material-design: true